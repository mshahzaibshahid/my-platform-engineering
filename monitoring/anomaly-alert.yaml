apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: aiops-anomaly-detection
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: aiops.rules
      rules:
        - alert: AbnormalErrorRate
          expr: |
            rate(http_requests_total{status=~"5.."}[5m])
            > 2 * avg_over_time(
                rate(http_requests_total{status=~"5.."}[5m])[1h:5m]
              )
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "AIOps Alert: Error rate 2x above baseline"

        - alert: PodRestartAnomaly
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "AIOps Alert: Pod restarting too frequently"
