apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: aiops-anomaly-detection
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: aiops.rules
      rules:
        - alert: AbnormalPodRestarts
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "AIOps Alert: Pod restarting too frequently"

        - alert: HighMemoryUsage
          expr: container_memory_usage_bytes > 100000000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "AIOps Alert: High memory usage detected"

        - alert: CPUSpikeDetected
          expr: rate(container_cpu_usage_seconds_total[5m]) > 0.8
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "AIOps Alert: CPU spike above 80%"
